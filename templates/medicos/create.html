{% extends 'base.html' %}

{% block title %} Registrar Medico {% endblock %} 

{% block content %}
<br>
<h1>Registro de un Medico</h1>
<form action="{{ url_for('medico.create') }}" method="POST">

  <div class="mb-3">
    <label for="" class="form-label">Nombre</label>
    <input type="text" class="form-control" name="nombre" required />
  </div>

  <div class="mb-3">
    <label for="" class="form-label">Especialidad</label>
    <input type="text" class="form-control" name="especialidad" required />
  </div>

  <div class="mb-3">
    <label for="" class="form-label">Telefono</label>
    <input type="tel" class="form-control" name="telefono" required />
  </div>

  <div class="mb-3">
    <label for="" class="form-label">Correo</label>
    <input type="email" class="form-control" name="email" required />
  </div>


  <button type="submit" class="btn btn-primary">Registrar Medico</button>

</form>
{% endblock %}
