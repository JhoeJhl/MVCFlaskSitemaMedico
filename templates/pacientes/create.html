{% extends 'base.html' %}

{% block title %} Registrar Paciente {% endblock %} 

{% block content %}
<br>
<h1>Registro de un Paciente</h1>
<form action="{{ url_for('paciente.create') }}" method="POST">

  <div class="mb-3">
    <label for="" class="form-label">Nombre</label>
    <input type="text" class="form-control" name="nombre" required />
  </div>

  <div class="mb-3">
    <label for="" class="form-label">Edad</label>
    <input type="number" min="0" class="form-control" name="edad" required />
  </div> 

  <div class="mb-3">
    <label for="" class="form-label">Direccion</label>
    <input type="tel" class="form-control" name="direccion" required />
  </div>

  <div class="mb-3">
    <label for="" class="form-label">Telefono</label>
    <input type="text" class="form-control" name="telefono" required />
  </div>


  <button type="submit" class="btn btn-primary">Registrar Paciente</button>

</form>
{% endblock %}
