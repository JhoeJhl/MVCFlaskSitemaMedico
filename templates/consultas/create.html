{% extends 'base.html' %}

{% block title %} Crear Consulta {% endblock %} 

{% block content %}
<br>
<h1>Registro de Consulta</h1>
<form action="{{ url_for('consulta.create') }}" method="POST">

  <div class="mb-3">
    <label for="" class="form-label">Fecha</label>
    <input type="date" class="form-control" name="fecha" required />
  </div>

  <div class="mb-3">
    <label for="" class="form-label">Diagnostico</label>
    <input type="text" class="form-control" name="diagnostico" required />
  </div>

  <div class="mb-3">
    <label for="" class="form-label">Tratamiento</label>
    <input type="text" class="form-control" name="tratamiento" required />
  </div>

  <div class="mb-3">
    <label for="" class="form-label">Medico</label>
    <select name="id_medico" class="form-control">
        <option>Seleccione un Medico</option>
        {% for medico in medicos %}
            <option value="{{medico.id_medico}}">{{medico.nombre}}</option>
        {% endfor %}
    </select>
  </div>

  <div class="mb-3">
    <label for="" class="form-label">Paciente</label>
    <select name="id_paciente" class="form-control">
        <option>Seleccion un Paciente</option>
        {% for paciente in pacientes %}
            <option value="{{paciente.id_paciente}}">{{paciente.nombre}}</option>
        {% endfor %}
    </select>
  </div>

  <button type="submit" class="btn btn-primary">Registrar Consulta</button>
</form>
{% endblock %}
